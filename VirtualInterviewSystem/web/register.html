<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="displayErrorFromQuery(); applyDarkModeFromStorage()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">Register</h2>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
            </div>
            <form action="#" method="post" onsubmit="return handleRegister(event)">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input id="name" name="name" type="text" class="form-control" placeholder="Your name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="Choose a strong password" required>
                    <div class="form-text">Use at least 8 characters, including uppercase, lowercase, number, and symbol.</div>
                </div>
                <div id="registerError" class="text-danger mb-3"></div>
                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
