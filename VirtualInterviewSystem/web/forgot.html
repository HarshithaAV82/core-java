<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="applyDarkModeFromStorage()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">Forgot Password</h2>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
            </div>
            <form action="#" method="post" onsubmit="return handleForgotPassword(event)">
                <div class="mb-3">
                    <label for="forgotEmail" class="form-label">Registered Email</label>
                    <input id="forgotEmail" name="forgotEmail" type="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input id="newPassword" name="newPassword" type="password" class="form-control" placeholder="Enter a new strong password" required>
                    <div class="form-text">Use at least 8 characters, including uppercase, lowercase, number, and symbol.</div>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="Confirm your new password" required>
                </div>
                <div id="forgotError" class="text-danger mb-3"></div>
                <div id="forgotMessage" class="text-success mb-3"></div>
                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>
            <div class="text-center mt-3">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
