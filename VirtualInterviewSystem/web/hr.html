<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Interview - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="loadInterviewPage('HR')">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
                <div>
                    <h2 id="interviewTitle" class="mb-1" data-i18n="hrInterview">HR Interview</h2>
                    <small class="text-muted" id="roleDifficultyText">Role: <span id="selectedRoleText">General</span> · Difficulty: <span id="selectedDifficultyText">Medium</span></small>
                </div>
                <div class="d-flex gap-2 align-items-center mt-3 mt-sm-0">
                    <select id="languageSelect" class="form-select form-select-sm" onchange="saveLanguage(this.value)">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="hi">हिन्दी</option>
                    </select>
                    <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
                </div>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div id="timerDisplay" class="text-secondary">Time left: 60s</div>
                    <div id="speakingScoreDisplay" class="text-secondary">Score: 0/100</div>
                </div>
                <div class="progress">
                    <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                </div>
            </div>
            <div id="tipsBox" class="card bg-light p-3 mb-4">
                <strong data-i18n="interviewTip">Interview Tip</strong>
                <p id="tipsText" class="mb-0 text-secondary">Speak clearly, answer with examples, and keep a calm pace.</p>
            </div>
            <div id="questionBox" class="mb-4">
                <p id="questionText" class="fs-5"></p>
                <p id="recordStatus" class="text-muted"></p>
                <button id="startButton" type="button" onclick="startRecording()" class="btn btn-outline-primary w-100 mb-2" data-i18n="startRecording">Start Recording</button>
                <button id="stopButton" type="button" onclick="stopRecording()" class="btn btn-secondary w-100 mb-2" disabled data-i18n="stopRecording">Stop Recording</button>
                <audio id="audioPlayback" controls class="w-100 mb-3" style="display:none"></audio>
                <div id="transcriptContainer" class="card bg-light p-3 mb-3">
                    <strong id="transcriptLabel" data-i18n="transcriptLabel">Live Transcript</strong>
                    <p id="transcriptText" class="mb-0 text-secondary">Transcript will appear here when speech recognition is active.</p>
                </div>
                <button id="nextButton" type="button" onclick="nextQuestion()" class="btn btn-success w-100" disabled data-i18n="nextQuestion">Next Question</button>
            </div>
            <button id="submitButton" onclick="submitInterview('HR')" class="btn btn-primary w-100 mb-2" disabled data-i18n="submitHR">Submit HR Interview</button>
            <a href="dashboard.html" class="btn btn-outline-secondary w-100" data-i18n="backToDashboard">Back to Dashboard</a>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
