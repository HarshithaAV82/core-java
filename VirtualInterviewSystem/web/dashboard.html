<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="loadDashboard()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4 text-center">
            <h2 class="mb-3">Welcome, <span id="dashboardName">Candidate</span></h2>
            <p class="text-muted mb-4">Choose the interview type below.</p>
            <a href="hr.html" class="d-block mb-2"><button class="btn btn-primary w-100">HR Interview</button></a>
            <a href="technical.html" class="d-block mb-4"><button class="btn btn-success w-100">Technical Interview</button></a>
            <button onclick="logoutUser()" class="btn btn-outline-secondary w-100">Logout</button>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
