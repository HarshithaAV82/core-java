<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="showResetSuccessMessage()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4 text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0" data-i18n="resetSuccessTitle">Password Reset Complete</h2>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
            </div>
            <p id="resetSuccessMessage" class="text-success mb-3"></p>
            <p class="text-muted mb-4" data-i18n="redirectMessage">You will be redirected to login shortly.</p>
            <p class="mb-4">Redirecting in <span id="resetCountdown">5</span> seconds...</p>
            <a href="login.html" class="btn btn-primary w-100" data-i18n="goToLogin">Go to Login Now</a>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
