<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="showResultMessage()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4 text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">Interview Submitted Successfully</h2>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
            </div>
            <p class="text-muted mb-3">Your interview has been submitted. Thank you!</p>
            <div id="resultDetails" class="text-start mb-4"></div>
            <div id="feedbackMessage" class="alert alert-secondary mb-4" role="alert"></div>
            <div id="certificateSection" class="card p-4 mb-4 text-start certificate certificate-card">
                <div id="certificateCard" class="p-4 certificate-body">
                    <div class="certificate-header text-center mb-4">
                        <h4 class="mb-1">Certificate of Completion</h4>
                        <p class="small text-muted">Awarded for successfully completing the virtual interview session</p>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12 col-md-6 mb-2">
                            <p class="mb-1 text-uppercase text-muted small">Candidate</p>
                            <h5 id="certificateName" class="mb-0"></h5>
                        </div>
                        <div class="col-12 col-md-6 mb-2">
                            <p class="mb-1 text-uppercase text-muted small">Interview</p>
                            <h5 id="certificateInterviewType" class="mb-0"></h5>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12 col-md-6 mb-2">
                            <p class="mb-1 text-uppercase text-muted small">Score</p>
                            <h5 id="certificateScore" class="mb-0"></h5>
                        </div>
                        <div class="col-12 col-md-6 mb-2">
                            <p class="mb-1 text-uppercase text-muted small">Date</p>
                            <h5 id="certificateDate" class="mb-0"></h5>
                        </div>
                    </div>
                </div>
                <button onclick="printCertificate()" class="btn btn-outline-primary w-100 mt-3">Print Certificate</button>
            </div>
            <a href="dashboard.html" class="btn btn-primary w-100 mb-2">Return to Dashboard</a>
            <a href="index.html" class="btn btn-outline-secondary w-100">Back to Home</a>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
