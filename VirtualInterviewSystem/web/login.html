<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Virtual Interview System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="displayErrorFromQuery(); applyDarkModeFromStorage()">
    <div class="container mt-5">
        <div class="card box shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">Login</h2>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
            </div>
            <form action="#" method="post" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="admin@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="1234" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a href="forgot.html">Forgot password?</a>
                    <span class="text-muted small">Use admin@gmail.com / 1234 for quick access.</span>
                </div>
                <div id="loginError" class="text-danger mb-3"></div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="text-center mt-3 mb-0">New to the system? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
